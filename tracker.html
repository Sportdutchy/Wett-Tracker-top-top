<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Wett Tracker">
<title>Wett Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05080f; --surface:#0b1120; --border:#162035;
  --green:#00e676; --red:#ff4444; --gold:#ffc947; --blue:#38b6ff; --purple:#a78bfa;
  --text:#e8edf5; --muted:#4a5568;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding-bottom:60px;}
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:100;}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1;}
.ttl span{color:var(--green);}
.tabs{display:flex;margin-top:8px;overflow-x:auto;}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:1px;padding:8px 11px;white-space:nowrap;}
.tab.on{border-bottom-color:var(--green);color:var(--text);}
.bdy{padding:14px 16px;max-width:500px;margin:0 auto;}
.pnl{display:none;}.pnl.on{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.lbl{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;width:100%;outline:none;}
.inp:focus{border-color:var(--blue);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.pg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.mb{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-family:inherit;font-size:11px;padding:7px 3px;text-align:center;}
.mb.on{background:#0c2a4a;border-color:var(--blue);color:var(--blue);}
.pb{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-family:inherit;font-size:10px;padding:8px 4px;text-align:center;}
.pb.on{background:#0c2a4a;border-color:var(--blue);color:var(--blue);}
.bw{background:#14532d;border:none;border-radius:8px;color:var(--green);cursor:pointer;font-family:inherit;font-size:16px;font-weight:500;padding:13px;width:100%;}
.bl{background:#7f1d1d;border:none;border-radius:8px;color:var(--red);cursor:pointer;font-family:inherit;font-size:16px;font-weight:500;padding:13px;width:100%;}
.gh{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-family:inherit;font-size:11px;padding:5px 10px;}
.gh.af{border-color:var(--blue);color:var(--blue);}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1.1;}
.st{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;margin-top:12px;}
.gr{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.br{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ldd{background:var(--surface);border:1px solid var(--border);border-radius:8px;max-height:220px;overflow-y:auto;margin-top:4px;position:relative;z-index:50;}
.lgl{font-size:9px;color:#334155;padding:5px 12px 2px;background:var(--surface);position:sticky;top:0;letter-spacing:1px;}
.li{padding:7px 14px;font-size:13px;color:#94a3b8;cursor:pointer;}
.li:hover,.li.on{background:#0c2a4a;color:var(--blue);}
.ls{font-size:11px;color:var(--blue);margin-top:4px;padding:3px 8px;background:#0c2a4a;border-radius:5px;display:inline-block;}
.wb{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:4px 0 10px;}
.wf{height:100%;border-radius:3px;transition:width .5s;}
/* Cloud sync box */
.sync-box{background:#0a1a10;border:1px solid #162e20;border-radius:10px;padding:14px;margin-bottom:10px;}
.sync-title{font-size:10px;color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.sync-desc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.6;}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:baseline;gap:10px;">
    <div class="ttl">WETT<span>TRACKER</span></div>
    <div id="hprofit" style="font-size:11px;"></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="go('eingabe')">EINGABE</button>
    <button class="tab" onclick="go('stats')">STATS</button>
    <button class="tab" onclick="go('analyse')">ANALYSE</button>
    <button class="tab" onclick="go('verlauf')">VERLAUF</button>
    <button class="tab" onclick="go('daten')">DATEN</button>
  </div>
</div>

<div class="bdy">

  <!-- EINGABE -->
  <div id="pnl-eingabe" class="pnl on">
    <div class="g2">
      <div><div class="lbl">Einsatz (€)</div><input class="inp" id="stake" type="number" value="20"></div>
      <div><div class="lbl">Quote</div><input class="inp" id="odds" type="number" value="1.57" step="0.01"></div>
    </div>
    <div class="g2">
      <div><div class="lbl">Datum</div><input class="inp" id="bdate" type="date"></div>
      <div><div class="lbl">Uhrzeit</div><input class="inp" id="btime" type="time"></div>
    </div>
    <div style="margin-bottom:8px;">
      <div class="lbl">Liga</div>
      <div style="position:relative;">
        <input class="inp" id="lsearch" type="text" placeholder="Liga suchen..." oninput="filterL()" onfocus="openL()" style="padding-right:28px;">
        <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#334155;font-size:10px;pointer-events:none;">▼</span>
      </div>
      <div id="lsel" class="ls" style="display:none;"></div>
      <div id="ldd" class="ldd" style="display:none;"></div>
    </div>
    <div style="margin-bottom:8px;">
      <div class="lbl">Markt — Über X Tore</div>
      <div class="mg" id="mktg"></div>
    </div>
    <div style="margin-bottom:8px;">
      <div class="lbl">Zeitraum</div>
      <div class="pg" id="periodg"></div>
    </div>
    <div class="g2" style="margin-bottom:8px;">
      <button class="bw" onclick="add('W')">✓ GEWONNEN</button>
      <button class="bl" onclick="add('L')">✗ VERLOREN</button>
    </div>
    <div style="text-align:right;margin-bottom:4px;">
      <button class="gh" onclick="delLast()">↩ Letzte löschen</button>
    </div>
    <div id="toast" style="display:none;padding:9px 14px;border-radius:8px;font-size:12px;text-align:center;margin-top:8px;"></div>
  </div>

  <!-- STATS -->
  <div id="pnl-stats" class="pnl">
    <div id="stats-out"></div>
  </div>

  <!-- ANALYSE -->
  <div id="pnl-analyse" class="pnl">
    <div id="analyse-out"></div>
  </div>

  <!-- VERLAUF -->
  <div id="pnl-verlauf" class="pnl">
    <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;">
      <button class="gh af" onclick="filt('all',this)">Alle</button>
      <button class="gh" onclick="filt('W',this)">✓ Gewonnen</button>
      <button class="gh" onclick="filt('L',this)">✗ Verloren</button>
    </div>
    <div id="vcnt" style="font-size:10px;color:var(--muted);margin-bottom:8px;"></div>
    <div id="vlist"></div>
  </div>

  <!-- DATEN -->
  <div id="pnl-daten" class="pnl">

    <!-- CLOUD SYNC -->
    <div class="sync-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div class="sync-title">☁ Cloud Sync</div>
        <div id="sync-st" style="font-size:10px;color:var(--muted);">Nicht eingerichtet</div>
      </div>
      <div class="sync-desc">
        PC &amp; Handy automatisch synchron.<br>
        Kostenlos über <b style="color:var(--text);">jsonbin.io</b> — einmalig einrichten.
      </div>
      <div style="margin-bottom:8px;">
        <div class="lbl">API Key (von jsonbin.io)</div>
        <input class="inp" id="skey" type="text" placeholder="$2a$10$..." style="font-size:11px;">
      </div>
      <div style="margin-bottom:10px;">
        <div class="lbl">Bin ID (leer lassen beim ersten Mal)</div>
        <input class="inp" id="sbinid" type="text" placeholder="wird automatisch erstellt..." style="font-size:11px;">
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="gh" style="color:var(--green);border-color:#162e20;" onclick="saveSync()">✓ Speichern</button>
        <button class="gh" style="color:var(--blue);border-color:#0c2a4a;" onclick="pullCloud()">⬇ Von Cloud laden</button>
      </div>
    </div>

    <!-- MANUELL -->
    <div class="lbl" style="margin-bottom:8px;">Manuelles Backup</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
      <button class="gh" style="color:var(--blue);border-color:#0c2a4a;" onclick="expData()">⬇ Download</button>
      <button class="gh" style="color:var(--blue);border-color:#0c2a4a;" onclick="cpData()">📋 Kopieren</button>
      <button class="gh" style="color:var(--purple);border-color:#2d1b69;" onclick="toggleImp()">⬆ Import</button>
      <button class="gh" style="color:var(--red);border-color:#7f1d1d;" onclick="clrAll()">🗑 Löschen</button>
    </div>
    <div id="impbox" style="display:none;background:var(--surface);border:1px solid #2d1b69;border-radius:10px;padding:12px;margin-bottom:10px;">
      <div style="font-size:11px;color:var(--purple);margin-bottom:6px;">JSON einfügen:</div>
      <textarea id="imptext" class="inp" rows="4" placeholder='[{"id":...}]' style="resize:vertical;font-size:11px;font-family:monospace;"></textarea>
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button class="gh" style="color:var(--purple);" onclick="impData()">✓ Importieren</button>
        <button class="gh" onclick="toggleImp()">Abbrechen</button>
      </div>
    </div>
    <div id="dtost" style="display:none;padding:9px 14px;border-radius:8px;font-size:12px;text-align:center;"></div>
  </div>

</div>

<script>
var BE = 1/1.55;
var bets = [];
var mkt = '2.5';
var per = 'Ganzes Spiel';
var league = 'Bundesliga';
var fv = 'all';
var syncKey = '';
var syncBin = '';
var syncing = false;

var MKTS = ['0.5','1.5','2.5','3.5','4.5','5.5','6.5'];
var PERS = ['1. Halbzeit','2. Halbzeit','Ganzes Spiel'];
var LGS = {
  '🏆 International':['Champions League','Europa League','Conference League','WM Quali','Nations League'],
  '🇩🇪 Deutschland':['Bundesliga','2. Bundesliga','3. Liga','DFB Pokal'],
  '🏴󠁧󠁢󠁥󠁮󠁧󠁿 England':['Premier League','Championship','League One','League Two'],
  '🇪🇸 Spanien':['La Liga','Segunda División'],
  '🇮🇹 Italien':['Serie A','Serie B'],
  '🇫🇷 Frankreich':['Ligue 1','Ligue 2'],
  '🇳🇱 Niederlande':['Eredivisie','Eerste Divisie'],
  '🇵🇹 Portugal':['Primeira Liga','Segunda Liga'],
  '🇧🇪 Belgien':['First Division A','First Division B'],
  '🇹🇷 Türkei':['Süper Lig','1. Lig'],
  '🇦🇹 Österreich':['Bundesliga AT','2. Liga AT'],
  '🇨🇭 Schweiz':['Super League CH','Challenge League'],
  '🇸🇪 Schweden':['Allsvenskan','Superettan'],
  '🇳🇴 Norwegen':['Eliteserien','1. divisjon'],
  '🇩🇰 Dänemark':['Superliga DK','1. Division DK'],
  '🇵🇱 Polen':['Ekstraklasa','1. Liga PL'],
  '🇭🇷 Kroatien':['HNL','1. NL HR'],
  '🇷🇴 Rumänien':['Liga 1 RO','Liga 2 RO'],
  '🇺🇦 Ukraine':['Premier League UA','Persha liha'],
  '🇷🇸 Serbien':['SuperLiga RS','Prva liga RS'],
  '🇮🇱 Israel':['Premier League IL','Liga Leumit'],
  '🇸🇦 Saudi-Arabien':['Saudi Pro League','First Division SA'],
  '🇦🇪 VAE':['UAE Pro League','UAE Division 1'],
  '🇶🇦 Katar':['Qatar Stars League','Qatar First Division'],
  '🇮🇷 Iran':['Persian Gulf Pro League','Azadegan League'],
  '🇯🇵 Japan':['J1 League','J2 League','J3 League'],
  '🇰🇷 Südkorea':['K League 1','K League 2'],
  '🇨🇳 China':['Chinese Super League','China League One'],
  '🇮🇳 Indien':['Indian Super League','I-League'],
  '🇦🇺 Australien':['A-League','NPL'],
  '🇧🇷 Brasilien':['Brasileirão Série A','Brasileirão Série B'],
  '🇦🇷 Argentinien':['Liga Profesional','Primera Nacional'],
  '🇲🇽 Mexiko':['Liga MX','Liga de Expansión'],
  '🇺🇸 USA':['MLS','USL Championship'],
  '🇨🇴 Kolumbien':['Categoría Primera A','Torneo BetPlay'],
  '🇨🇱 Chile':['Primera División CL','Primera B CL'],
  '🇿🇦 Südafrika':['DStv Premiership','First Division ZA'],
  '🇪🇬 Ägypten':['Egyptian Premier League'],
  '🇲🇦 Marokko':['Botola Pro','Botola 2'],
  '✏️ Sonstige':['Sonstige']
};

function pad(n){return String(n).padStart(2,'0');}

function init(){
  // Load from localStorage
  try{var r=localStorage.getItem('wt_bets');bets=r?JSON.parse(r):[];}catch(e){bets=[];}
  try{syncKey=localStorage.getItem('wt_skey')||'';syncBin=localStorage.getItem('wt_sbin')||'';}catch(e){}

  // Set date/time
  var n=new Date();
  document.getElementById('bdate').value=n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
  document.getElementById('btime').value=pad(n.getHours())+':'+pad(n.getMinutes());
  document.getElementById('lsearch').value=league;

  // Build market buttons
  var mg=document.getElementById('mktg');
  MKTS.forEach(function(m){
    var b=document.createElement('button');
    b.className='mb'+(m===mkt?' on':'');
    b.textContent='Ü'+m;
    b.onclick=function(){mkt=m;document.querySelectorAll('.mb').forEach(function(x){x.classList.remove('on');});b.classList.add('on');};
    mg.appendChild(b);
  });

  // Build period buttons
  var pg=document.getElementById('periodg');
  PERS.forEach(function(p){
    var b=document.createElement('button');
    b.className='pb'+(p===per?' on':'');
    b.textContent=p==='1. Halbzeit'?'1. HZ':p==='2. Halbzeit'?'2. HZ':'Gesamt';
    b.onclick=function(){per=p;document.querySelectorAll('.pb').forEach(function(x){x.classList.remove('on');});b.classList.add('on');};
    pg.appendChild(b);
  });

  // Close league on outside click
  document.addEventListener('click',function(e){
    var dd=document.getElementById('ldd');
    var inp=document.getElementById('lsearch');
    if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';
  });

  updSync();
  updHdr();
}

// League dropdown
function openL(){filterL();document.getElementById('ldd').style.display='block';}
function filterL(){
  var q=document.getElementById('lsearch').value.toLowerCase();
  var dd=document.getElementById('ldd');
  dd.innerHTML='';dd.style.display='block';
  Object.keys(LGS).forEach(function(g){
    var ls=LGS[g].filter(function(l){return l.toLowerCase().indexOf(q)>=0;});
    if(!ls.length)return;
    var gl=document.createElement('div');gl.className='lgl';gl.textContent=g;dd.appendChild(gl);
    ls.forEach(function(l){
      var it=document.createElement('div');
      it.className='li'+(l===league?' on':'');
      it.textContent=l;
      it.onmousedown=function(e){
        e.preventDefault();
        league=l;
        document.getElementById('lsearch').value=l;
        var s=document.getElementById('lsel');s.textContent='✓ '+l;s.style.display='inline-block';
        dd.style.display='none';
      };
      dd.appendChild(it);
    });
  });
}

// Tabs
function go(name){
  document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('pnl-'+name).classList.add('on');
  var names=['eingabe','stats','analyse','verlauf','daten'];
  document.querySelectorAll('.tab')[names.indexOf(name)].classList.add('on');
  if(name==='stats')rStats();
  if(name==='analyse')rAnalyse();
  if(name==='verlauf')rVerlauf();
  if(name==='daten')loadSyncUI();
}

// Toast
var tt=null;
function toast(msg,ok,id){
  var el=document.getElementById(id||'toast');
  el.textContent=msg;el.style.display='block';
  el.style.background=ok===false?'#7f1d1d':'#14532d';
  el.style.color=ok===false?'var(--red)':'var(--green)';
  clearTimeout(tt);tt=setTimeout(function(){el.style.display='none';},2500);
}

// Save
function save(){
  try{localStorage.setItem('wt_bets',JSON.stringify(bets));}catch(e){}
  if(syncKey&&syncBin)pushCloud();
}

function updHdr(){
  var s=cStats(bets);
  var el=document.getElementById('hprofit');
  if(!s){el.textContent='';return;}
  el.textContent=(s.profit>=0?'+':'')+s.profit.toFixed(0)+'€';
  el.style.color=s.profit>=0?'var(--green)':'var(--red)';
}

// Add / delete
function add(result){
  var s=parseFloat(document.getElementById('stake').value);
  var o=parseFloat(document.getElementById('odds').value);
  var lg=league||document.getElementById('lsearch').value||'Unbekannt';
  if(!s||!o||o<1)return toast('Ungültige Eingabe',false);
  var dv=document.getElementById('bdate').value;
  var tv=document.getElementById('btime').value;
  var dt=dv&&tv?new Date(dv+'T'+tv+':00').toISOString():new Date().toISOString();
  var pnl=result==='W'?s*(o-1):-s;
  bets.push({id:Date.now(),stake:s,odds:o,result:result,league:lg,market:mkt,period:per,date:dt});
  save();updHdr();
  toast((pnl>=0?'+':'')+pnl.toFixed(2)+'€ · '+lg,result==='W');
}
function delLast(){if(!bets.length)return;bets.pop();save();updHdr();toast('Gelöscht');}
function delBet(id){bets=bets.filter(function(b){return b.id!==id;});save();updHdr();rVerlauf();}

// Calc
function cStats(arr){
  if(!arr.length)return null;
  var w=arr.filter(function(b){return b.result==='W';});
  var wr=w.length/arr.length;
  var avgO=arr.reduce(function(s,b){return s+b.odds;},0)/arr.length;
  var profit=arr.reduce(function(s,b){return s+(b.result==='W'?b.stake*(b.odds-1):-b.stake);},0);
  var ev=wr*(avgO-1)-(1-wr);
  var streak=0;for(var i=arr.length-1;i>=0;i--){if(arr[i].result==='L')streak++;else break;}
  return{wins:w.length,losses:arr.length-w.length,n:arr.length,wr:wr,avgO:avgO,profit:profit,ev:ev,streak:streak};
}
function cGroup(arr,key){
  var g={};
  arr.forEach(function(b){var k=b[key]||'?';if(!g[k])g[k]=[];g[k].push(b);});
  return Object.keys(g).map(function(name){var s=cStats(g[name]);return Object.assign({name:name},s);}).sort(function(a,b){return b.profit-a.profit;});
}

// Render Stats
function rStats(){
  var el=document.getElementById('stats-out');
  var s=cStats(bets);
  if(!s){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px;font-size:12px;">Noch keine Wetten</div>';return;}
  var gc=s.wr>=BE?'var(--green)':'var(--red)';
  var h='<div class="card">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">';
  h+='<div><div class="lbl">Gesamtgewinn</div><div style="font-family:Bebas Neue,sans-serif;font-size:40px;color:'+gc+';line-height:1;">'+(s.profit>=0?'+':'')+s.profit.toFixed(2)+'€</div></div>';
  h+='<div style="text-align:right;"><div class="lbl">EV</div><div style="font-size:13px;font-weight:600;color:'+gc+'">'+(s.ev>0?'✓ POSITIV':'✗ NEGATIV')+'</div><div style="font-size:11px;color:var(--muted);">'+(s.ev*100>=0?'+':'')+(s.ev*100).toFixed(2)+'%</div></div>';
  h+='</div>';
  h+='<div class="lbl">Winrate '+(s.wr*100).toFixed(1)+'% — Break-Even '+(BE*100).toFixed(1)+'%</div>';
  h+='<div class="wb"><div class="wf" style="width:'+Math.min(100,s.wr*100)+'%;background:'+gc+';"></div></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">';
  [{l:'Wetten',v:s.n,c:''},{l:'Gewonnen',v:s.wins,c:'var(--green)'},{l:'Verloren',v:s.losses,c:'var(--red)'},
   {l:'Ø Quote',v:s.avgO.toFixed(3),c:s.avgO>=1.55?'var(--green)':'var(--red)'},{l:'Verlustserie',v:s.streak+'x',c:s.streak>=4?'var(--red)':s.streak>=2?'var(--gold)':'var(--muted)'},{l:'Ø €/Tag',v:(s.profit/Math.max(1,Math.ceil(s.n/20))).toFixed(0)+'€',c:s.profit>=0?'var(--green)':'var(--red)'}
  ].forEach(function(it){
    h+='<div class="sc"><div class="lbl">'+it.l+'</div><div class="sv" style="color:'+(it.c||'var(--text)')+'">'+it.v+'</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

// Render Analyse
function rAnalyse(){
  var el=document.getElementById('analyse-out');
  if(!bets.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px;font-size:12px;">Noch keine Daten</div>';return;}
  function gRows(data){
    return data.map(function(g){
      var c=g.ev>0?'var(--green)':'var(--red)';
      return '<div class="gr"><div class="dot" style="background:'+c+';"></div><div style="flex:1;font-size:13px;color:#cbd5e1;">'+g.name+'</div><div style="font-size:11px;color:var(--muted);">'+g.n+'W</div><div style="font-size:12px;color:var(--muted);margin-left:6px;">'+(g.wr*100).toFixed(1)+'%</div><div style="font-size:13px;font-weight:600;min-width:55px;text-align:right;color:'+(g.profit>=0?'var(--green)':'var(--red)')+';">'+(g.profit>=0?'+':'')+g.profit.toFixed(1)+'€</div></div>';
    }).join('');
  }
  var h='<div class="st">📊 Nach Liga</div>'+gRows(cGroup(bets,'league'));
  h+='<div class="st">⚽ Nach Markt</div>'+gRows(cGroup(bets,'market').map(function(g){return Object.assign({},g,{name:'Ü'+g.name+' Tore'});}));
  h+='<div class="st">⏱ Nach Zeitraum</div>'+gRows(cGroup(bets,'period'));
  el.innerHTML=h;
}

// Render Verlauf
function filt(v,btn){
  fv=v;
  document.querySelectorAll('#pnl-verlauf .gh').forEach(function(b){b.classList.remove('af');});
  btn.classList.add('af');
  rVerlauf();
}
function rVerlauf(){
  var fl=bets.slice().reverse().filter(function(b){return fv==='all'||b.result===fv;});
  document.getElementById('vcnt').textContent=fl.length+' Wetten';
  var el=document.getElementById('vlist');
  if(!fl.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:12px;">Keine Wetten</div>';return;}
  el.innerHTML=fl.slice(0,100).map(function(b){
    var pnl=b.result==='W'?b.stake*(b.odds-1):-b.stake;
    var d=new Date(b.date);
    return '<div class="br"><div class="dot" style="background:'+(b.result==='W'?'var(--green)':'var(--red)')+';"></div><div style="flex:1;min-width:0;"><div style="font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+b.league+'</div><div style="font-size:10px;color:var(--muted);">Ü'+b.market+' · '+(b.period||'Gesamt')+' · '+b.stake+'€ @ '+b.odds+' · '+d.getDate()+'.'+(d.getMonth()+1)+'. '+pad(d.getHours())+':'+pad(d.getMinutes())+'</div></div><div style="font-size:13px;font-weight:500;color:'+(pnl>=0?'var(--green)':'var(--red)')+';margin-right:4px;">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'€</div><button onclick="delBet('+b.id+')" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 5px;" onmouseover="this.style.color=\'var(--red)\'" onmouseout="this.style.color=\'var(--muted)\'">✕</button></div>';
  }).join('');
}

// Cloud Sync
function updSync(){
  var el=document.getElementById('sync-st');
  if(!el)return;
  el.textContent=syncKey&&syncBin?'☁ Sync aktiv ✓':'Nicht eingerichtet';
  el.style.color=syncKey&&syncBin?'var(--green)':'var(--muted)';
}
function loadSyncUI(){
  if(syncKey)document.getElementById('skey').value=syncKey;
  if(syncBin)document.getElementById('sbinid').value=syncBin;
  updSync();
}
function saveSync(){
  var k=document.getElementById('skey').value.trim();
  var b=document.getElementById('sbinid').value.trim();
  if(!k)return toast('API Key fehlt',false,'dtost');
  syncKey=k;syncBin=b;
  try{localStorage.setItem('wt_skey',k);localStorage.setItem('wt_sbin',b);}catch(e){}
  if(!b){createBin();}else{toast('Gespeichert ✓',true,'dtost');updSync();}
}
async function createBin(){
  toast('Erstelle Cloud-Speicher...',true,'dtost');
  try{
    var res=await fetch('https://api.jsonbin.io/v3/b',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':syncKey,'X-Bin-Name':'wett-tracker'},
      body:JSON.stringify({bets:bets})
    });
    var data=await res.json();
    if(data.metadata&&data.metadata.id){
      syncBin=data.metadata.id;
      try{localStorage.setItem('wt_sbin',syncBin);}catch(e){}
      document.getElementById('sbinid').value=syncBin;
      toast('Cloud erstellt ✓ — Bin ID notieren!',true,'dtost');
      updSync();
    }else{toast('Fehler — API Key prüfen',false,'dtost');}
  }catch(e){toast('Verbindungsfehler',false,'dtost');}
}
async function pushCloud(){
  if(!syncKey||!syncBin||syncing)return;
  syncing=true;
  try{
    await fetch('https://api.jsonbin.io/v3/b/'+syncBin,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':syncKey},
      body:JSON.stringify({bets:bets})
    });
  }catch(e){}
  syncing=false;
}
async function pullCloud(){
  if(!syncKey||!syncBin)return toast('Sync nicht eingerichtet',false,'dtost');
  toast('Lade von Cloud...',true,'dtost');
  try{
    var res=await fetch('https://api.jsonbin.io/v3/b/'+syncBin+'/latest',{
      headers:{'X-Master-Key':syncKey}
    });
    var data=await res.json();
    if(data.record&&data.record.bets){
      bets=data.record.bets;
      save();rStats();rVerlauf();updHdr();
      toast(bets.length+' Wetten geladen ✓',true,'dtost');
    }else{toast('Keine Daten gefunden',false,'dtost');}
  }catch(e){toast('Verbindungsfehler',false,'dtost');}
}

// Manual backup
function expData(){
  var blob=new Blob([JSON.stringify(bets,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='wett_backup.json';a.click();
  URL.revokeObjectURL(url);
  toast('Exportiert ✓',true,'dtost');
}
function cpData(){
  navigator.clipboard.writeText(JSON.stringify(bets)).then(function(){toast('Kopiert ✓',true,'dtost');}).catch(function(){toast('Fehler',false,'dtost');});
}
function toggleImp(){
  var b=document.getElementById('impbox');
  b.style.display=b.style.display==='none'?'block':'none';
}
function impData(){
  try{
    var p=JSON.parse(document.getElementById('imptext').value);
    if(!Array.isArray(p))throw new Error();
    var added=0;
    p.forEach(function(b){if(!bets.find(function(x){return x.id===b.id;})){bets.push(b);added++;}});
    bets.sort(function(a,b){return a.id-b.id;});
    save();updHdr();
    document.getElementById('imptext').value='';
    document.getElementById('impbox').style.display='none';
    toast(added+' Wetten importiert ✓',true,'dtost');
  }catch(e){toast('Ungültiges Format',false,'dtost');}
}
function clrAll(){
  if(confirm('Alle Daten löschen?')){bets=[];save();updHdr();toast('Gelöscht',true,'dtost');}
}

init();
</script>
</body>
</html>
